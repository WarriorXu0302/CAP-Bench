name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-imports:
    name: Python syntax & import check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install root dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check construct module
        run: python -m compileall -q src/construct src/main_construct.py src/configs.py scripts

      - name: Smoke import construct package
        env:
          PYTHONPATH: src
        run: python -c "import construct; from construct import Sampler, Proposer, Refiner; print('construct package OK')"

  evaluate-syntax:
    name: cap-eval syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile-check cap_eval
        run: python -m compileall -q src/evaluate/cap_eval src/evaluate/run_eval.py src/evaluate/generate_eval.py src/evaluate/count.py

  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check --select E9,F63,F7,F82 --output-format github
